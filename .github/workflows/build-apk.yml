name: Fabriquer l'APK Automatiquement

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Recuperation du code
        uses: actions/checkout@v4

      - name: 2. Installation de Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Detection et Compilation
        run: |
          ROOT_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" -print -quit)
          
          if [ -z "$ROOT_PATH" ]; then
            ROOT_PATH=$(find . -name "build.gradle" -o -name "build.gradle.kts" -print -quit)
          fi
          
          if [ -z "$ROOT_PATH" ]; then
            echo "Erreur : Racine Android introuvable."
            exit 1
          fi
          
          DOSSIER_PROJET=$(dirname "$ROOT_PATH")
          echo "Projet detecte dans : $DOSSIER_PROJET"
          cd "$DOSSIER_PROJET"
          
          if [ -f "gradlew" ]; then
            echo "Utilisation de gradlew local..."
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Utilisation du Gradle global..."
            gradle assembleDebug
          fi

      - name: 4. Extraction de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: Mon_Application_Android_APK
          path: "**/build/outputs/apk/debug/app-debug.apk"        # On se déplace à la racine du projet
        DOSSIER_PROJET=$(dirname "$ROOT_PATH")
        echo "🟢 Racine du projet Android détectée dans : $DOSSIER_PROJET"
        cd "$DOSSIER_PROJET"
        
        # Si gradlew est là, on l'utilise. Sinon, on utilise le Gradle universel de GitHub.
        if [ -f "gradlew" ]; then
          echo "🤖 Fichier gradlew trouvé. Utilisation de la configuration locale..."
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "🌍 Fichier gradlew manquant. Utilisation du Gradle universel de GitHub..."
          gradle assembleDebug
        fi

    - name: 4. Mise à disposition du fichier APK
      uses: actions/upload-artifact@v4
      with:
        name: Mon_Application_Android_APK
        path: "**/build/outputs/apk/debug/app-debug.apk"        cd "$DOSSIER_PROJET"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: 4. Mise à disposition du fichier APK
      uses: actions/upload-artifact@v4
      with:
        name: Mon_Application_Android_APK
        path: "**/build/outputs/apk/debug/app-debug.apk" # Cherche l'APK partout
